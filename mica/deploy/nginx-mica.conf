# =====================================================================
# MICA MAB — Nginx snippet for the upload size limit
#
# WHY THIS FILE EXISTS
# --------------------
# Nginx caps request bodies at 1 MB by default. The API accepts uploads up to
# 50 MB (MAX_FILE_SIZE_BYTES in media.controller.ts), but nginx rejects anything
# larger than its own limit BEFORE the request reaches the app — returning a
# 413 HTML page with no JSON body, so the UI could only show a generic failure.
#
# In practice this looks like "photos upload from a laptop but fail from an
# iPad/iPhone": phone cameras produce 3–12 MB files, laptop images are usually
# smaller. The device is irrelevant — the file size is what differs.
#
# Every other app in this repo already sets this (get-pass 12M, it-support 6M,
# evaluation 10M). MICA had no nginx config at all, so it ran on the 1 MB default.
#
# HOW TO APPLY
# ------------
# Add the client_max_body_size line inside the `server { }` block that serves
# MICA, then:
#     sudo nginx -t            # verify the config parses
#     sudo systemctl reload nginx
#
# Confirm it took effect:
#     curl -s -o /dev/null -w "%{http_code}\n" -X POST \
#       -F "file=@somefile.jpg" https://<your-mica-domain>/api/media/upload
# A 413 means the limit is still too low; 401/400 means the body got through.
# =====================================================================

server {
    # ... your existing server_name / ssl / root directives ...

    # Must be >= the API's own limit (50 MB) so nginx never rejects a file the
    # application would have accepted. Nginx should not be the stricter gate:
    # when it rejects, the client gets an HTML 413 with no explanation, whereas
    # the API returns a clear JSON error the UI can display.
    client_max_body_size 50M;

    # Large uploads over slow mobile connections need more than the 60s default,
    # otherwise a phone on cellular times out mid-upload.
    client_body_timeout 300s;
    proxy_read_timeout 300s;
    proxy_send_timeout 300s;

    location /api/ {
        proxy_pass http://127.0.0.1:4000/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Streams the body through instead of buffering the whole file to disk
        # first — noticeably faster for multi-megabyte photo uploads.
        proxy_request_buffering off;
    }

    location / {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
