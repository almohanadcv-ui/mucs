services:
  db:
    image: mysql:8.0
    container_name: mab-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-changeme}
      MYSQL_DATABASE: ${DB_NAME:-mab_united_db}
      TZ: Asia/Riyadh
    volumes:
      - mab-db-data:/var/lib/mysql
    command: >
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
      --default-authentication-plugin=caching_sha2_password
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p${DB_PASSWORD:-changeme}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - mab-net

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: mab-server
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 5000
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost}
      DB_HOST: db
      DB_USER: root
      DB_PASSWORD: ${DB_PASSWORD:-changeme}
      DB_NAME: ${DB_NAME:-mab_united_db}
      DB_DIALECT: mysql
      DB_POOL_MAX: 20
      DB_POOL_MIN: 2
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: 1d
      MAX_FILE_SIZE: 5242880
      BCRYPT_SALT_ROUNDS: 12
      MAIL_FROM: ${MAIL_FROM:-}
      MAIL_PASS: ${MAIL_PASS:-}
      MAIL_FROM_NAME: ${MAIL_FROM_NAME:-MAP UNITED IT}
      SETUP_KEY: ${SETUP_KEY:-}
    volumes:
      - mab-uploads:/app/uploads
      - mab-logs:/app/logs
      - mab-backups:/app/backups
    networks:
      - mab-net

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${PUBLIC_API_URL:-http://localhost}
    container_name: mab-client
    restart: unless-stopped
    depends_on:
      - server
    ports:
      - "${CLIENT_PORT:-80}:80"
    networks:
      - mab-net

volumes:
  mab-db-data:
  mab-uploads:
  mab-logs:
  mab-backups:

networks:
  mab-net:
    driver: bridge
